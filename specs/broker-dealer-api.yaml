openapi: 3.1.0
info:
  title: Broker-Dealer API
  description: API for broker-dealers (both receiving and delivering) to handle requests and notifications in the BD change process
  version: 1.0.0
  contact:
    name: Broker-Dealer API Team
    email: api-support@example.com
servers:
  - url: https://api.example.com/v1/broker-dealer
    description: Production server
  - url: https://api-staging.example.com/v1/broker-dealer
    description: Staging server

paths:
  /submit-policy-inquiry-request:
    post:
      summary: Receive policy inquiry request from clearinghouse
      description: |
        Accept policy inquiry request from clearinghouse to provide policy information for specified accounts (delivering broker only).
        
        **Response Behavior:**
        - Broker can respond immediately with policy data (payload included) or defer processing (payload omitted)
        - When deferred, only code/message/transactionId are returned
        - Transaction ID must be reflected in any subsequent responses
      operationId: submitPolicyInquiryRequest
      parameters:
        - name: transactionId
          in: header
          required: true
          description: Unique transaction identifier that flows through all related requests
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyInquiryRequest'
      responses:
        '200':
          description: Policy inquiry request received successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
        '400':
          description: Bad request - invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /receive-policy-inquiry-response:
    post:
      summary: Receive policy inquiry response from clearinghouse
      description: |
        Accept policy inquiry response forwarded from clearinghouse (receiving broker only).
        This endpoint receives the detailed policy information from the delivering broker via clearinghouse.
        
        **Response Behavior:**
        - Responses may contain immediate policy data (payload included) or deferred processing notifications
        - Transaction ID propagated from original request for tracking
      operationId: receivePolicyInquiryResponse
      parameters:
        - name: transactionId
          in: header
          required: true
          description: Unique transaction identifier that flows through all related requests
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyInquiryResponse'
      responses:
        '200':
          description: Policy inquiry response received successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
        '400':
          description: Bad request - invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /receive-bd-change-request:
    post:
      summary: Receive BD change request from clearinghouse
      description: Accept BD change request forwarded from clearinghouse (receiving broker only)
      operationId: receiveBdChangeRequest
      parameters:
        - name: transactionId
          in: header
          required: true
          description: Unique transaction identifier that flows through all related requests
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BdChangeRequest'
      responses:
        '200':
          description: BD change request received successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
        '400':
          description: Bad request - invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /receive-transfer-notification:
    post:
      summary: Receive transfer notification from clearinghouse
      description: Accept transfer-related notifications from clearinghouse
      operationId: receiveTransferNotification
      parameters:
        - name: transactionId
          in: header
          required: true
          description: Unique transaction identifier that flows through all related requests
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferNotification'
      responses:
        '200':
          description: Transfer notification received successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
        '400':
          description: Bad request - invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /generate-carrier-letter:
    post:
      summary: Generate an off-DTCC servicing agent change letter
      description: |
        Generate a formal servicing agent change letter addressed directly to the
        insurance carrier. Used when a DTCC Policy Inquiry returns "no contracts found"
        and the broker-dealer must contact the carrier off-platform.

        The carrier directory is consulted to resolve the mailing address and surface
        any carrier-specific submission requirements (proprietary form required,
        notarization, medallion guarantee, processing time, etc.).

        Returns the letter as plain text and as a Base64-encoded PDF.

        **Response codes:**
        - `GENERATED` — letter and PDF produced; `payload.letterText` and `payload.pdfBase64` populated
        - `CARRIER_OWN_FORM` — carrier requires its proprietary form; letter not generated;
          `payload` contains form name, notes, and portal URL
        - `VALIDATION_ERROR` — required fields missing or carrier not found and no address supplied
      operationId: generateCarrierLetter
      parameters:
        - name: transactionId
          in: header
          required: true
          description: Unique transaction identifier for request correlation
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarrierLetterRequest'
            example:
              requestId: "req-abc-123"
              carrierName: "Pacific Life"
              client:
                name: "Joshua Lee"
                ssnLast4: "8122"
              policyNumbers: ["PAC-200011"]
              currentAgent:
                name: "Robert Hughes"
                npn: "11223344"
              newAgent:
                name: "Amanda Foster"
                npn: "27530463"
                bdName: "Strategic Wealth Advisors"
                bdDtccId: "SWA001"
              reasonForChange: "Client requested transfer to new advisor following relocation"
              trailingCommission: "no"
              effectiveDateRequested: "2026-03-15"
              requestingFirm:
                name: "Strategic Wealth Advisors"
                contact: "Amanda Foster"
                phone: "800-555-0101"
      responses:
        '200':
          description: |
            Letter generated successfully (`GENERATED`) or carrier requires its own form
            (`CARRIER_OWN_FORM`). Both cases return HTTP 200.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
              examples:
                generated:
                  summary: Letter generated successfully
                  value:
                    code: "GENERATED"
                    message: "Carrier letter generated for Pacific Life Insurance Company"
                    transactionId: "123e4567-e89b-12d3-a456-426614174000"
                    processingMode: "immediate"
                    payload:
                      letterText: "Strategic Wealth Advisors\n=========================\n..."
                      pdfBase64: "JVBERi0xLjQ..."
                      metadata:
                        carrier: "Pacific Life Insurance Company"
                        client: "Joshua Lee"
                        policyNumbers: ["PAC-200011"]
                        newAgent: "Amanda Foster"
                        generatedDate: "2026-02-25"
                        carrierRequirements:
                          wetSignatureRequired: true
                          notarizationRequired: false
                          medallionRequired: false
                          notes: "Accepts firm letterhead. Include copy of new agent's carrier appointment confirmation."
                          processingTimeDays: 5
                carrier_own_form:
                  summary: Carrier requires proprietary form
                  value:
                    code: "CARRIER_OWN_FORM"
                    message: "Nationwide Life and Annuity Insurance Company requires the use of Nationwide Form NAT-3017 — Broker of Record Change."
                    transactionId: "123e4567-e89b-12d3-a456-426614174000"
                    processingMode: "immediate"
                    payload:
                      carrierName: "Nationwide Life and Annuity Insurance Company"
                      ownFormName: "Nationwide Form NAT-3017 — Broker of Record Change"
                      notes: "Must use Nationwide's proprietary Form NAT-3017. Letters on firm letterhead are not accepted."
                      portalUrl: "https://nationwide.com/advisor-portal"
        '400':
          description: Missing fields or carrier address unresolvable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Letter or PDF generation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /extract-policy-from-pdf:
    post:
      summary: Extract policy data from a carrier statement PDF
      description: |
        Accept a Base64-encoded carrier policy statement PDF and extract structured
        policy and client data using Claude's native PDF understanding via Amazon Bedrock.

        The extracted data is returned in the standard `policyInquiryResponse` format,
        allowing a broker-dealer to populate a BD Change request from a scanned or
        downloaded account statement without calling a carrier API directly.

        **Processing:**
        - Claude reads the PDF layout natively — no OCR library is required
        - All policies found in the document are extracted and returned
        - Field extraction handles individual, joint, trust, and entity account types

        **Response codes:**
        - `EXTRACTED` — extraction succeeded; `payload.policyInquiryResponse` is populated
      operationId: extractPolicyFromPdf
      parameters:
        - name: transactionId
          in: header
          required: true
          description: Unique transaction identifier for request correlation
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PdfExtractionRequest'
            example:
              requestId: "req-abc-123"
              pdfBase64: "JVBERi0xLjQg..."
      responses:
        '200':
          description: Policy data extracted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
              example:
                code: "EXTRACTED"
                message: "Policy data extracted from document"
                transactionId: "123e4567-e89b-12d3-a456-426614174000"
                processingMode: "immediate"
                payload:
                  policyInquiryResponse:
                    requestingFirm:
                      firmName: "Strategic Wealth Advisors"
                      firmId: null
                      servicingAgent:
                        agentName: "Amanda Foster"
                        npn: "27530463"
                    producerValidation:
                      agentName: "Amanda Foster"
                      npn: "27530463"
                      errors: []
                    client:
                      clientName: "Joshua Lee"
                      ssnLast4: "8122"
                      policies:
                        - policyNumber: "ATH-100053"
                          carrierName: "Athene Annuity"
                          accountType: "individual"
                          planType: "rothIra"
                          ownership: "single"
                          productName: "Athene MYG 5 MVA"
                          cusip: null
                          trailingCommission: false
                          contractStatus: "active"
                          withdrawalStructure:
                            systematicInPlace: false
                          errors: []
                    enums:
                      accountType: ["individual", "joint", "trust", "custodial", "entity"]
                      planType: ["nonQualified", "rothIra", "traditionalIra", "sep", "simple"]
        '400':
          description: Bad request — missing or invalid fields, or unreadable PDF
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing_fields:
                  summary: Missing required fields
                  value:
                    code: "VALIDATION_ERROR"
                    message: "Missing required fields: pdfBase64"
                invalid_pdf:
                  summary: Invalid base64 or unreadable PDF
                  value:
                    code: "INVALID_PDF"
                    message: "Invalid base64 encoding: ..."
                missing_header:
                  summary: Missing transactionId header
                  value:
                    code: "MISSING_HEADER"
                    message: "transactionId header is required"
        '500':
          description: Extraction failed — Bedrock error or model returned non-JSON
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "EXTRACTION_ERROR"
                message: "Model returned non-JSON output. Check the PDF is a readable policy statement."

  /query-status/{transactionId}:
    get:
      summary: Query transaction status
      description: Retrieve current status and history for a specific transaction
      operationId: queryTransactionStatus
      parameters:
        - name: transactionId
          in: path
          required: true
          description: Unique transaction identifier
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Transaction status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionStatus'
        '404':
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    CarrierLetterRequest:
      type: object
      required:
        - requestId
        - carrierName
        - client
        - policyNumbers
        - currentAgent
        - newAgent
        - reasonForChange
        - trailingCommission
        - requestingFirm
      additionalProperties: false
      properties:
        requestId:
          type: string
          description: Caller-supplied request identifier. Echoed in logs.
        carrierName:
          type: string
          description: |
            Carrier name or alias. Used to look up mailing address and submission
            requirements from the carrier directory.
            If not found, `carrierAddress` must be provided.
        carrierDepartment:
          type: string
          description: |
            Department to address the letter to (e.g. "Annuity Service Center").
            Defaults to the directory value when the carrier is found.
        carrierAddress:
          type: object
          description: |
            Full mailing address. Optional when the carrier resolves in the directory.
            Required otherwise.
          required: [line1, city, state, zip]
          additionalProperties: false
          properties:
            line1:  { type: string }
            line2:  { type: string, default: "" }
            city:   { type: string }
            state:  { type: string, minLength: 2, maxLength: 2 }
            zip:    { type: string }
        client:
          type: object
          required: [name, ssnLast4]
          additionalProperties: false
          properties:
            name:     { type: string, description: "Full legal name of the policy owner." }
            ssnLast4: { type: string, minLength: 4, maxLength: 4, description: "Last 4 digits of SSN." }
        policyNumbers:
          type: array
          items: { type: string }
          minItems: 1
          description: Policy/contract numbers to include in the letter.
        currentAgent:
          type: object
          required: [name, npn]
          additionalProperties: false
          properties:
            name: { type: string, description: "Full name of the agent being replaced." }
            npn:  { type: string, description: "NPN of the agent being replaced." }
        newAgent:
          type: object
          required: [name, npn, bdName, bdDtccId]
          additionalProperties: false
          properties:
            name:     { type: string, description: "Full name of the incoming servicing agent." }
            npn:      { type: string, description: "NPN of the incoming agent." }
            bdName:   { type: string, description: "Name of the receiving broker-dealer." }
            bdDtccId: { type: string, description: "DTCC firm ID of the receiving broker-dealer." }
        reasonForChange:
          type: string
          description: Plain-language explanation for the change.
        trailingCommission:
          type: string
          enum: [yes, no, unknown]
          description: Whether trailing commissions apply to the new servicing agent.
        effectiveDateRequested:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
          description: Requested effective date (YYYY-MM-DD). Omit for "as soon as possible".
        requestingFirm:
          type: object
          required: [name, contact, phone]
          additionalProperties: false
          properties:
            name:    { type: string, description: "BD firm submitting this letter." }
            contact: { type: string, description: "Authorized representative name." }
            phone:   { type: string, description: "Contact phone number." }

    PdfExtractionRequest:
      type: object
      required:
        - requestId
        - pdfBase64
      additionalProperties: false
      properties:
        requestId:
          type: string
          description: Caller-supplied request identifier. Echoed in logs for correlation with downstream systems.
          example: "req-abc-123"
        pdfBase64:
          type: string
          description: |
            Base64-encoded bytes of the carrier policy statement PDF.
            Standard or URL-safe encoding is accepted.
            The PDF is passed directly to Claude via Amazon Bedrock as a native document block
            — no intermediate text extraction is performed.

    PolicyInquiryRequest:
      type: object
      required:
        - requestingFirm
        - client
      properties:
        requestingFirm:
          type: object
          required:
            - firmName
            - firmId
            - servicingAgent
          properties:
            firmName:
              type: string
              nullable: true
              description: Name of the requesting firm
            firmId:
              type: string
              nullable: true
              description: Identifier of the requesting firm
            servicingAgent:
              type: object
              required:
                - agentName
                - npn
              properties:
                agentName:
                  type: string
                  nullable: true
                  description: Name of the servicing agent
                npn:
                  type: string
                  nullable: true
                  description: National Producer Number of the agent
        client:
          type: object
          required:
            - clientName
            - ssn
            - policyNumbers
          properties:
            clientName:
              type: string
              nullable: true
              description: Name of the client
            ssn:
              type: string
              nullable: true
              description: Social Security Number of the client
            policyNumbers:
              type: array
              items:
                type: string
              description: List of policy numbers for the client

    PolicyInquiryResponse:
      type: object
      required:
        - requestingFirm
        - producerValidation
        - client
        - enums
      properties:
        requestingFirm:
          type: object
          required:
            - firmName
            - firmId
            - servicingAgent
          properties:
            firmName:
              type: string
              nullable: true
              description: Echoed requesting firm name from the request
            firmId:
              type: string
              nullable: true
              description: Echoed DTCC firm identifier from the request
            servicingAgent:
              type: object
              required:
                - agentName
                - npn
              properties:
                agentName:
                  type: string
                  nullable: true
                  description: Echoed agent name from the request
                npn:
                  type: string
                  nullable: true
                  description: Echoed NPN from the request
        producerValidation:
          type: object
          required:
            - agentName
            - npn
            - errors
          properties:
            agentName:
              type: string
              nullable: true
              description: Echoed agent name from the request
            npn:
              type: string
              nullable: true
              description: Echoed NPN from the request
            errors:
              type: array
              items:
                $ref: '#/components/schemas/ProducerError'
              description: Producer-level validation errors
        client:
          type: object
          required:
            - clientName
            - ssnLast4
            - policies
          properties:
            clientName:
              type: string
              nullable: true
              description: Client name echoed back for confirmation
            ssnLast4:
              type: string
              nullable: true
              description: Last four digits of the client's SSN for security
            policies:
              type: array
              items:
                $ref: '#/components/schemas/DetailedPolicyInfo'
              description: List of policy details
        enums:
          type: object
          required:
            - accountType
            - planType
          properties:
            accountType:
              type: array
              items:
                type: string
                enum: [individual, joint, trust, custodial, entity]
              description: Valid account type values
            planType:
              type: array
              items:
                type: string
                enum: [nonQualified, rothIra, traditionalIra, sep, simple]
              description: Valid plan type values

    DetailedPolicyInfo:
      type: object
      required:
        - policyNumber
        - carrierName
        - accountType
        - planType
        - ownership
        - productName
        - cusip
        - trailingCommission
        - contractStatus
        - withdrawalStructure
        - errors
      properties:
        policyNumber:
          type: string
          nullable: true
          description: Policy number identifying the policy
        carrierName:
          type: string
          nullable: true
          description: Name of the insurance carrier that wrote the annuity
        accountType:
          type: string
          enum: [individual, joint, trust, custodial, entity]
          nullable: true
          description: Registration type of the account
        planType:
          type: string
          enum: [nonQualified, rothIra, traditionalIra, sep, simple]
          nullable: true
          description: Tax qualification type of the account
        ownership:
          type: string
          nullable: true
          description: Ownership structure of the policy
        productName:
          type: string
          nullable: true
          description: Name of the annuity product
        cusip:
          type: string
          nullable: true
          description: CUSIP identifier for the product
        trailingCommission:
          type: boolean
          description: Whether trailing commission will apply to the new servicing agent
        contractStatus:
          type: string
          nullable: true
          description: Current status of the contract
        withdrawalStructure:
          type: object
          required:
            - systematicInPlace
          properties:
            systematicInPlace:
              type: boolean
              description: Whether a systematic withdrawal plan is currently active
        errors:
          type: array
          items:
            $ref: '#/components/schemas/PolicyError'
          description: Any errors or issues associated with this policy

    ManifestRequest:
      type: object
      required:
        - manifest-request
      properties:
        manifest-request:
          type: object
          required:
            - requesting-firm
            - client
          properties:
            requesting-firm:
              type: object
              required:
                - firm-name
                - firm-id
                - servicing-agent
              properties:
                firm-name:
                  type: string
                  nullable: true
                  description: Name of the requesting firm
                firm-id:
                  type: string
                  nullable: true
                  description: Identifier of the requesting firm
                servicing-agent:
                  type: object
                  required:
                    - agent-name
                    - npn
                  properties:
                    agent-name:
                      type: string
                      nullable: true
                      description: Name of the servicing agent
                    npn:
                      type: string
                      nullable: true
                      description: National Producer Number of the agent
            client:
              type: object
              required:
                - client-name
                - ssn
                - contract-numbers
              properties:
                client-name:
                  type: string
                  nullable: true
                  description: Name of the client
                ssn:
                  type: string
                  nullable: true
                  description: Social Security Number of the client
                contract-numbers:
                  type: array
                  items:
                    type: string
                  description: List of contract numbers for the client

    BdChangeRequest:
      type: object
      required:
        - transaction-id
        - receiving-broker-id
        - delivering-broker-id
        - carrier-id
        - policy-id
      properties:
        transaction-id:
          type: string
          format: uuid
          description: Unique transaction identifier
        receiving-broker-id:
          type: string
          description: Identifier of the receiving broker-dealer
        delivering-broker-id:
          type: string
          description: Identifier of the delivering broker-dealer
        carrier-id:
          type: string
          description: Identifier of the insurance carrier
        policy-id:
          type: string
          description: Policy identifier
        policy-details:
          type: object
          description: Detailed policy information for validation
        broker-details:
          type: object
          description: Receiving broker information for validation
        validation-requirements:
          type: object
          description: Specific validation requirements (licensing, appointments, suitability, etc.)
        request-timestamp:
          type: string
          format: date-time
          description: When the request was made
        validation-result:
          type: string
          enum: [approved, rejected]
          description: Carrier validation result (for responses)
        rejection-reason:
          type: string
          description: Reason for rejection (if applicable)
        approval-details:
          type: object
          description: Additional approval information (open-ended)
        response-timestamp:
          type: string
          format: date-time
          description: When the response was received
        additional-data:
          type: object
          description: Additional request/response data (open-ended)

    TransferNotification:
      type: object
      required:
        - transaction-id
        - notification-type
        - policy-id
      properties:
        transaction-id:
          type: string
          format: uuid
          description: Unique transaction identifier
        notification-type:
          type: string
          enum: [transfer-approved, transfer-initiated, transfer-confirmed, transfer-complete]
          description: Type of transfer notification
        policy-id:
          type: string
          description: Policy identifier
        receiving-broker-id:
          type: string
          description: Identifier of the receiving broker-dealer
        delivering-broker-id:
          type: string
          description: Identifier of the delivering broker-dealer
        carrier-id:
          type: string
          description: Identifier of the insurance carrier
        notification-timestamp:
          type: string
          format: date-time
          description: When the notification was sent
        additional-data:
          type: object
          description: Additional notification data (open-ended)

    TransactionStatus:
      type: object
      required:
        - transaction-id
        - current-status
        - created-at
        - updated-at
      properties:
        transaction-id:
          type: string
          format: uuid
          description: Unique transaction identifier
        current-status:
          type: string
          enum: 
            - MANIFEST_REQUESTED
            - MANIFEST_RECEIVED
            - DUE_DILIGENCE_COMPLETE
            - CARRIER_VALIDATION_PENDING
            - CARRIER_APPROVED
            - CARRIER_REJECTED
            - TRANSFER_INITIATED
            - TRANSFER_PROCESSING
            - TRANSFER_CONFIRMED
            - COMPLETE
          description: Current transaction status
        status-history:
          type: array
          items:
            $ref: '#/components/schemas/StatusHistoryItem'
          description: History of status changes
        created-at:
          type: string
          format: date-time
          description: Transaction creation timestamp
        updated-at:
          type: string
          format: date-time
          description: Last update timestamp
        broker-role:
          type: string
          enum: [receiving, delivering]
          description: Role of this broker in the transaction
        additional-data:
          type: object
          description: Additional status data (open-ended)

    StatusHistoryItem:
      type: object
      required:
        - status
        - timestamp
      properties:
        status:
          type: string
          description: Status value
        timestamp:
          type: string
          format: date-time
          description: When status was set
        notes:
          type: string
          description: Additional notes about status change

    StandardResponse:
      type: object
      required:
        - code
        - message
        - transactionId
      properties:
        code:
          type: string
          description: |
            Response code indicating the result status.
            Examples: "IMMEDIATE", "DEFERRED", "RECEIVED"
          example: "IMMEDIATE"
        message:
          type: string
          description: Human-readable response message describing the operation result
        transactionId:
          type: string
          format: uuid
          description: |
            Unique transaction identifier for tracking the request.
            Must be reflected in all subsequent related requests and responses.
        payload:
          oneOf:
            - $ref: '#/components/schemas/PolicyInquiryResponse'
            - type: object
              nullable: true
          description: |
            Optional response payload containing the actual data.
            **Broker Payload Behavior:**
            - **Immediate responses**: Include full PolicyInquiryResponse payload
            - **Deferred responses**: Payload is null, processing continues asynchronously
            - **Direct carrier requests**: May include immediate carrier response data
            - When present, contains the complete policy inquiry response data
        processingMode:
          type: string
          enum: [immediate, deferred, queued, routed]
          description: |
            Indicates how the request is being processed:
            - immediate: Response payload included immediately
            - deferred: Processing will complete asynchronously
            - queued: Request queued for batch processing
            - routed: Request forwarded to another system (e.g., carrier, clearinghouse)
        estimatedResponseTime:
          type: string
          description: |
            Estimated completion time for deferred responses (ISO 8601 duration format).
            Examples: "PT5M" (5 minutes), "PT1H" (1 hour), "P1D" (1 day)
        routingInformation:
          type: object
          description: |
            Information about request routing for direct carrier access.
            Present when processingMode is "routed".
          properties:
            targetType:
              type: string
              enum: [carrier, clearinghouse]
              description: Type of target system for routing
            targetId:
              type: string
              description: Identifier of the target system
            routedAt:
              type: string
              format: date-time
              description: When the request was routed
      examples:
        immediate_response:
          summary: Immediate response with policy data
          value:
            code: "IMMEDIATE"
            message: "Policy inquiry processed successfully"
            transactionId: "123e4567-e89b-12d3-a456-426614174000"
            payload:
              requestingFirm:
                firmName: "ABC Financial"
                firmId: "ABCFIN001"
                servicingAgent:
                  agentName: "John Smith"
                  npn: "12345678"
              producerValidation:
                agentName: "John Smith"
                npn: "12345678"
                errors: []
              client:
                clientName: "Jane Doe"
                ssnLast4: "1234"
                policies:
                  - policyNumber: "POL123456"
                    carrierName: "Pacific Life"
                    accountType: "individual"
                    planType: "nonQualified"
                    ownership: "single"
                    productName: "Pacific Destinations"
                    cusip: "694308AB1"
                    trailingCommission: true
                    contractStatus: "active"
                    withdrawalStructure:
                      systematicInPlace: false
                    errors: []
              enums:
                accountType: ["individual", "joint", "trust", "custodial", "entity"]
                planType: ["nonQualified", "rothIra", "traditionalIra", "sep", "simple"]
            processingMode: "immediate"
        deferred_response:
          summary: Deferred response
          value:
            code: "DEFERRED"
            message: "Policy inquiry request received and queued for processing"
            transactionId: "123e4567-e89b-12d3-a456-426614174000"
            payload: null
            processingMode: "deferred"
            estimatedResponseTime: "PT15M"
        routed_to_carrier:
          summary: Request routed directly to carrier
          value:
            code: "ROUTED"
            message: "Policy inquiry request forwarded to carrier"
            transactionId: "123e4567-e89b-12d3-a456-426614174000"
            payload: null
            processingMode: "routed"
            routingInformation:
              targetType: "carrier"
              targetId: "PACIFIC_LIFE_001"
              routedAt: "2024-02-24T15:30:00Z"

    ProducerError:
      type: object
      required:
        - errorCode
        - message
      properties:
        errorCode:
          type: string
          enum: [notAppointed, notLicensed, affiliationMismatch]
          description: Specific producer error code identifying the type of error
        message:
          type: string
          description: Human-readable error message
      example:
        errorCode: "notAppointed"
        message: "Producer is not appointed with Pacific Life"

    PolicyError:
      type: object
      required:
        - errorCode
        - message
      properties:
        errorCode:
          type: string
          enum: [ssnContractMismatch, proprietaryProduct, policyInactive, policyRestricted]
          description: Specific error code identifying the type of error
        message:
          type: string
          description: Human-readable error message
      example:
        errorCode: "ssnContractMismatch"
        message: "Client's SSN does not match the contract on file"

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Error code
          example: "VALIDATION_ERROR"
        message:
          type: string
          description: Human-readable error message

  # OUTBOUND API CALLS AND DIRECT CARRIER ACCESS
  #
  # Broker-dealers make outbound calls to both clearinghouse and carriers depending on the routing pattern:
  #
  # CLEARINGHOUSE ROUTING (Traditional Flow):
  # - POST to clearinghouse /submit-policy-inquiry-request (from receiving broker)
  # - POST to clearinghouse /submit-policy-inquiry-response (from delivering broker)
  # - POST to clearinghouse /receive-bd-change-request (from receiving broker)
  # - POST to clearinghouse /receive-transfer-confirmation (from delivering broker)
  #
  # DIRECT CARRIER ACCESS (New Pattern):
  # - POST to carrier /submit-policy-inquiry-request (from any broker, bypassing clearinghouse)
  # - This allows brokers to call carriers directly when:
  #   * Policy-to-carrier mapping is known
  #   * Faster response times are required
  #   * Carrier supports direct broker integration
  #   * Clearinghouse routing is unavailable
  #
  # POLICY-TO-CARRIER DISCOVERY:
  # Brokers can determine the appropriate carrier using:
  # 1. Policy number prefix/format patterns
  # 2. Industry databases (NAIC company codes, etc.)
  # 3. Previous transaction history
  # 4. Carrier-specific policy registries
  # 5. Fallback to clearinghouse routing when carrier cannot be determined
  #
  # DIRECT CARRIER REQUEST FLOW:
  # 1. Receiving broker determines carrier from policy numbers
  # 2. Broker calls carrier /submit-policy-inquiry-request directly
  # 3. Carrier responds immediately (payload included) or defers (payload null)
  # 4. For deferred responses, carrier calls clearinghouse /submit-policy-inquiry-response
  # 5. Clearinghouse forwards response to receiving broker via /receive-policy-inquiry-response
  #
  # RESPONSE CONSISTENCY:
  # - Transaction IDs must be consistent across all systems (broker -> carrier -> clearinghouse)
  # - Response format is identical whether coming from clearinghouse or direct carrier
  # - Error handling and validation patterns remain consistent
  # - Status tracking works across both routing patterns
  #
  # EXAMPLE DIRECT CARRIER CALLS:
  # 
  # Request to Pacific Life carrier:
  # POST https://api.pacificlife.com/v1/submit-policy-inquiry-request
  # Headers:
  #   transactionId: 123e4567-e89b-12d3-a456-426614174000
  #   Content-Type: application/json
  # Body: { PolicyInquiryRequest payload }
  #
  # Immediate Response:
  # {
  #   "code": "IMMEDIATE",
  #   "message": "Policy inquiry processed successfully",
  #   "transactionId": "123e4567-e89b-12d3-a456-426614174000",
  #   "payload": { PolicyInquiryResponse with full policy data },
  #   "processingMode": "immediate"
  # }
  #
  # Deferred Response:
  # {
  #   "code": "DEFERRED", 
  #   "message": "Policy inquiry queued for processing",
  #   "transactionId": "123e4567-e89b-12d3-a456-426614174000",
  #   "payload": null,
  #   "processingMode": "deferred",
  #   "estimatedResponseTime": "PT10M"
  # }
