openapi: 3.1.0
info:
  title: Unified Brokerage Transfer API
  description: |
    API specification for facilitating brokerage transfer processes in the annuity industry.
    This API enables the complete broker change workflow as defined in the transfer process.
    
    **Roles**
    
    The API is meant to be used by data clearinghouses, broker dealers, and carriers. Ideally, the standard preference is to use a central clearinghouse for orchestrating transfers, ensuring 
    standardized processing and audit trails, and simplifying communication when multiple carriers may be involved in a broker dealer exchange. However, the transfer process may be conducted 
    directly with responsible entities implementing this standard when:
    - Direct entity relationships exist
    - Performance requirements demand reduced latency
    - Policy-to-entity mapping enables targeted routing, and the initiating party takes full reposnsibility for notifying all involved parties of the transfer
  
    
    **Brokerage Transfer Process:**
    
    The expected use of this API is the following:
    1. **Policy Inquiry Request** - The receiving broker submits a list of client accounts involved in the exchange. This could be to a carrier directly, or to a clearinghouse.
    2. **Policy Inquiry Response** - The entities providing policy information provide policy information, if they have it and can provide it via API. If an entity cannot provide via API, it is expected that a manual process for gathering policy data be initiated by the receiving broker, using publicly provided contact information (which could be exposed through the API). 
    3. **Due Diligence** - Once the receiving broker has received all policy information, they make a determination on the transfer eligibility of the broker exhcange. This part must be implemented by the receiving broker, and is not part of the standard. 
    4. **Servicing Agent Change** - The receiving broker initiates a service agent change with the carrier or the clearinghouse. Insurance carriers validate and approve/reject servicing agent changes based on their own criteria. 
    5. **Transfer Processing** - Once the broker change has been vlaidated by all involved parties that require verification (which could include carriers and brokers, but could also be orchestrated by a clearinghouse on behalf of a broker), a notification that the transfer is being processed is transmitted. 
    6. **Transfer Confirmation** - Any involved parties acknowledge that they have received notification of the transfer, and perform any additional in-house data changes that should occur as part of the transfer. 
    
    
    **Response Patterns:**
    
    It is expected that participating organizations implementing this API will not be able to immediately respond to requests for information, or may be incapable of facilitating data requests in certain scenarios. The API is designed to faciliatate asynchronous replies via standardized callbacks. The different operating modes and standard response codes are the following:
    
    - **Immediate (200)**: Entity provides complete response data directly
    - **Deferred (202)**: Entity acknowledges request and processes asynchronously
    - **Not Capable (422)**: Entity cannot fulfill request, provides capability information
    This flexibility accommodates varying processing capabilities and integration patterns.
    
    **Capability Levels:**
    
    A participant organization must, at a minimum, provide API capability for the callback methods in the API. If the callback is not able to be provided then the organization cannot participate. This is suitable to submit requests and retrieve information. 
    
    A carrier or a clearinghouse should implement all parts of the specification. 
    
    A broker dealer may implement a subset of the specification, but should not take responsibility for initiating transfers with the carriers on behalf of another broker. Transfers should be initiated directly with the carrier or via a clearinghouse. If a broker chooses to act as a clearinghouse, they should maintain separate APIs for their broker and clearinghouse to ensure separation of concerns. 
    
  version: 0.1.2
  contact:
    name: Unified Brokerage Transfer API Team
    email: api-support@example.com
servers:
  - url: https://api.example.com
    description: Production server
  - url: https://api-staging.example.com
    description: Staging server

paths:
  /v0/policy-inquiries:
    post:
      tags:
        - Policy Inquiries
      summary: Create policy inquiry request
      description: |
        Process policy inquiry request to provide policy information for specified accounts.
        
        **Response Behaviors:**
        - **200 Immediate**: Entity provides complete policy data directly in response body
        - **202 Deferred**: Entity acknowledges request and processes asynchronously, completing via policy-inquiries/reply endpoint
        - **422 Not Capable**: Entity cannot process request, provides capability information
        
        **Direct Entity Communication:**
        Partners can call this endpoint directly on any entity when:
        - Policy-to-entity mapping is known
        - Faster response times are required  
        - Direct integration is preferred
        - Traditional clearinghouse routing is unavailable
        
        APIs that cannot or will not support a feature are not available, and this largely applies to brokers that may not be able to facilitate policy transfers.
      operationId: createPolicyInquiry
      parameters:
        - name: requestId
          in: header
          required: true
          description: Unique request identifier (ULID) that flows through all related requests
          schema:
            type: string
            format: ulid
        - name: correlationId
          in: header
          required: false
          description: Optional correlation identifier for request tracking and debugging
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyInquiryRequest'
      responses:
        '200':
          description: |
            Policy inquiry processed successfully with immediate response.
            Response contains complete policy data or not found information.
          headers:
            correlationId:
              description: Correlation ID returned from request header
              schema:
                type: string
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PolicyInquiryResponse'
                  - $ref: '#/components/schemas/PolicyNotFoundResponse'
              examples:
                immediate_success:
                  summary: Immediate response with policy data
                  value:
                    requestingFirm:
                      firmName: "Example Wealth Management"
                      firmId: "12345"
                      servicingAgent:
                        agentName: "John Smith"
                        npn: "987654321"
                    producerValidation:
                      agentName: "John Smith"
                      npn: "987654321"
                      errors: []
                    client:
                      clientName: "Jane Doe"
                      ssnLast4: "1234"
                      policies: []
                    context: "AI analysis indicates standard risk profile with no compliance flags"
                immediate_not_found:
                  summary: Immediate response when policies not found
                  value:
                    requestingFirm:
                      firmName: "Example Wealth Management"
                      firmId: "12345"
                      servicingAgent:
                        agentName: "John Smith"
                        npn: "987654321"
                    client:
                      clientName: "Jane Doe"
                      ssnLast4: "1234"
                    notFoundPolicyNumbers: ["ABC123456", "DEF789012"]
                    message: "The requested policy numbers were not found in our system"
        '202':
          description: |
            Policy inquiry request accepted for deferred processing.
            Processing continues asynchronously.
          headers:
            correlationId:
              description: Correlation ID returned from request header
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeferredResponse'
              examples:
                deferred_inquiry_response:
                  summary: "Deferred inquiry response"
                  value:
                    code: "DEFERRED"
                    message: "Policy inquiry request accepted for processing"
                    requestId: "01JNQV8G3KXBCDEFGHJKMNPQRS"
                    estimatedResponseTime: "PT15M"
        '400':
          description: Bad request - invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Entity not capable of processing request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v0/policy-inquiries/replies:
    post:
      tags:
        - Policy Inquiries
      summary: Submit policy inquiry response (callback)
      description: |
        Submit detailed policy information response after processing a deferred request.
        
        **Usage Patterns:**
        - **To Clearinghouse**: Delivering broker or carrier submits response for forwarding
        - **Direct to Requester**: Entity responds directly to original requesting party
        - **Internal Processing**: Entity processes deferred requests asynchronously
        
        APIs that cannot or will not support a feature are not available, and this largely applies to brokers that may not be able to facilitate policy transfers.
      operationId: replyPolicyInquiry
      parameters:
        - name: requestId
          in: header
          required: true
          description: Unique request identifier (ULID) that flows through all related requests
          schema:
            type: string
            format: ulid
        - name: correlationId
          in: header
          required: false
          description: Optional correlation identifier for request tracking and debugging
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/PolicyInquiryResponse'
                - $ref: '#/components/schemas/PolicyNotFoundResponse'
      responses:
        '200':
          description: |
            Policy inquiry response submitted successfully. This endpoint acknowledges receipt of:
            - **PolicyInquiryResponse**: Complete policy data and validation results
            - **PolicyNotFoundResponse**: Confirmation that requested policies were not found
            The response confirms the callback was processed and may trigger further routing or notifications.
          headers:
            correlationId:
              description: Correlation ID returned from request header
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcknowledgmentResponse'
              examples:
                success_callback_acknowledged:
                  summary: Successful callback acknowledgment
                  value:
                    code: "RECEIVED"
                    message: "Policy inquiry response processed successfully"
                    requestId: "01JNQV8G3KXBCDEFGHJKMNPQRS"
                not_found_callback_acknowledged:
                  summary: Policy not found callback acknowledgment
                  value:
                    code: "RECEIVED"
                    message: "Policy not found response processed successfully"
                    requestId: "01JNQV8G3KXBCDEFGHJKMNPQRS"
        '400':
          description: Bad request - invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Entity not capable of processing request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v0/servicing-agent-changes:
    post:
      tags:
        - Servicing Agent Changes
      summary: Create servicing agent change request
      description: |
        Accept servicing agent change request for specific policies. This endpoint handles
        Step 4 of the servicing agent change process.
        
        APIs that cannot or will not support a feature are not available, and this largely applies to brokers that may not be able to facilitate policy transfers.
      operationId: createServicingAgentChange
      parameters:
        - name: requestId
          in: header
          required: true
          description: Unique request identifier (ULID) that flows through all related requests
          schema:
            type: string
            format: ulid
        - name: correlationId
          in: header
          required: false
          description: Optional correlation identifier for request tracking and debugging
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServicingAgentChangeRequest'
      responses:
        '200':
          description: |
            Servicing agent change processed successfully with immediate response.
            Response contains complete validation results for all policies.
          headers:
            correlationId:
              description: Correlation ID returned from request header
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServicingAgentChangeResponse'
        '202':
          description: |
            Servicing agent change request accepted for deferred processing.
            Processing continues asynchronously.
          headers:
            correlationId:
              description: Correlation ID returned from request header
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeferredResponse'
        '400':
          description: Bad request - invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Entity not capable of processing request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v0/servicing-agent-changes/replies:
    post:
      tags:
        - Servicing Agent Changes
      summary: Submit servicing agent change response (callback)
      description: |
        Accept validation response (approval/rejection) from insurance carrier or forwarding entity.
        This endpoint handles Step 5 of the servicing agent change process.
        
        APIs that cannot or will not support a feature are not available, and this largely applies to brokers that may not be able to facilitate policy transfers.
      operationId: replyServicingAgentChange
      parameters:
        - name: requestId
          in: header
          required: true
          description: Unique request identifier (ULID) that flows through all related requests
          schema:
            type: string
            format: ulid
        - name: correlationId
          in: header
          required: false
          description: Optional correlation identifier for request tracking and debugging
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServicingAgentChangeResponse'
      responses:
        '200':
          description: Servicing agent change response received successfully
          headers:
            correlationId:
              description: Correlation ID returned from request header
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcknowledgmentResponse'
        '400':
          description: Bad request - invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Entity not capable of processing request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v0/transfer-notifications:
    post:
      tags:
        - Transfer Notifications
      summary: Create transfer notification
      description: |
        Accept transfer-related notifications and confirmations.
        
        APIs that cannot or will not support a feature are not available, and this largely applies to brokers that may not be able to facilitate policy transfers.
      operationId: createTransferNotification
      parameters:
        - name: requestId
          in: header
          required: true
          description: Unique request identifier (ULID) that flows through all related requests
          schema:
            type: string
            format: ulid
        - name: correlationId
          in: header
          required: false
          description: Optional correlation identifier for request tracking and debugging
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferNotification'
      responses:
        '200':
          description: Transfer notification received successfully
          headers:
            correlationId:
              description: Correlation ID returned from request header
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcknowledgmentResponse'
        '202':
          description: Transfer notification accepted for deferred processing
          headers:
            correlationId:
              description: Correlation ID returned from request header
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeferredResponse'
        '400':
          description: Bad request - invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Entity not capable of processing request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v0/transfer-notifications/replies:
    post:
      tags:
        - Transfer Notifications
      summary: Submit transfer confirmation (callback)
      description: |
        Accept transfer confirmation from delivering entity or clearinghouse.
        
        APIs that cannot or will not support a feature are not available, and this largely applies to brokers that may not be able to facilitate policy transfers.
      operationId: replyTransferNotification
      parameters:
        - name: requestId
          in: header
          required: true
          description: Unique request identifier (ULID) that flows through all related requests
          schema:
            type: string
            format: ulid
        - name: correlationId
          in: header
          required: false
          description: Optional correlation identifier for request tracking and debugging
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferConfirmation'
      responses:
        '200':
          description: Transfer confirmation received successfully
          headers:
            correlationId:
              description: Correlation ID returned from request header
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcknowledgmentResponse'
        '400':
          description: Bad request - invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Entity not capable of processing request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v0/status/{requestId}:
    get:
      tags:
        - Status
      summary: Query request status
      description: |
        Retrieve current status and history for a specific request.
        
        Used for status polling of servicing agent change requests with pending appointments.
        
        APIs that cannot or will not support a feature are not available, and this largely applies to brokers that may not be able to facilitate policy transfers.
      operationId: queryRequestStatus
      parameters:
        - name: requestId
          in: path
          required: true
          description: Unique request identifier (ULID)
          schema:
            type: string
            format: ulid
        - name: correlationId
          in: header
          required: false
          description: Optional correlation identifier for request tracking and debugging
          schema:
            type: string
      responses:
        '200':
          description: Request status retrieved successfully
          headers:
            correlationId:
              description: Correlation ID returned from request header
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestStatus'
        '404':
          description: Request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Entity not capable of providing request status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    PolicyInquiryRequest:
      type: object
      required:
        - requestingFirm
        - client
      properties:
        requestingFirm:
          type: object
          required:
            - firmName
            - firmId
            - servicingAgent
          properties:
            firmName:
              type: [string, "null"]
              description: Name of the requesting firm
              # STYLE GUIDE DISCREPANCY: Should be 'name' per style guide for business entities
            firmId:
              type: ["string","null"]
              description: Identifier of the requesting firm
            servicingAgent:
              type: object
              required:
                - agentName
                - npn
              properties:
                agentName:
                  type: ["string","null"]
                  description: Name of the servicing agent
                  # STYLE GUIDE DISCREPANCY: Should use 'producer' terminology per style guide
                npn:
                  type: ["string","null"]
                  description: National Producer Number of the agent
        client:
          type: object
          required:
            - clientName
            - ssn
            - policyNumbers
          properties:
            clientName:
              type: ["string","null"]
              description: Name of the client
            ssn:
              type: ["string","null"]
              description: Social Security Number of the client
              # STYLE GUIDE NOTE: Could be 'taxId' per style guide but SSN is domain-specific
            policyNumbers:
              type: array
              items:
                type: string
              description: List of policy numbers for the client
              # STYLE GUIDE COMPLIANT: Uses 'policyNumber' as specified
        context:
          type: string
          description: AI-generated context and insights to be shared between entities for enhanced processing intelligence
          examples:
            - "Client has expressed urgency for transfer completion due to retirement planning needs."

    PolicyNotFoundResponse:
      type: object
      required:
        - requestingFirm
        - client
        - notFoundPolicyNumbers
      properties:
        requestingFirm:
          type: object
          required:
            - firmName
            - firmId
            - servicingAgent
          properties:
            firmName:
              type: ["string","null"]
              description: Echoed requesting firm name from the request
            firmId:
              type: ["string","null"]
              description: Echoed DTCC firm identifier from the request
            servicingAgent:
              type: object
              required:
                - agentName
                - npn
              properties:
                agentName:
                  type: ["string","null"]
                  description: Echoed agent name from the request
                npn:
                  type: ["string","null"]
                  description: Echoed NPN from the request
        client:
          type: object
          required:
            - clientName
            - ssnLast4
          properties:
            clientName:
              type: ["string","null"]
              description: Client name echoed back for confirmation
            ssnLast4:
              type: ["string","null"]
              description: Last four digits of the client's SSN for security
        notFoundPolicyNumbers:
          type: array
          items:
            type: string
          description: Policy numbers that were requested but not found in system
        message:
          type: string
          description: Human-readable message indicating policies were not found
          examples:
            - "The requested policy numbers were not found in our system"
        context:
          type: string
          description: AI-generated context and insights to be shared between entities for enhanced processing intelligence
          examples:
            - "Policies may exist under different variations of client name or SSN. Manual verification recommended."

    PolicyInquiryResponse:
      type: object
      required:
        - requestingFirm
        - producerValidation
        - client
      properties:
        requestingFirm:
          type: object
          required:
            - firmName
            - firmId
            - servicingAgent
          properties:
            firmName:
              type: ["string","null"]
              description: Echoed requesting firm name from the request
            firmId:
              type: ["string","null"]
              description: Echoed DTCC firm identifier from the request
            servicingAgent:
              type: object
              required:
                - agentName
                - npn
              properties:
                agentName:
                  type: ["string","null"]
                  description: Echoed agent name from the request
                npn:
                  type: ["string","null"]
                  description: Echoed NPN from the request
        producerValidation:
          type: object
          required:
            - agentName
            - npn
            - errors
          properties:
            agentName:
              type: ["string","null"]
              description: Echoed agent name from the request
            npn:
              type: ["string","null"]
              description: Echoed NPN from the request
            errors:
              type: array
              items:
                $ref: '#/components/schemas/ProducerError'
              description: Producer-level validation errors
        client:
          type: object
          required:
            - clientName
            - ssnLast4
            - policies
          properties:
            clientName:
              type: ["string","null"]
              description: Client name echoed back for confirmation
            ssnLast4:
              type: ["string","null"]
              description: Last four digits of the client's SSN for security
            policies:
              type: array
              items:
                $ref: '#/components/schemas/DetailedPolicyInfo'
              description: List of policy details
        context:
          type: string
          description: AI-generated context and insights to be shared between entities for enhanced processing intelligence
          examples:
            - "AI analysis indicates standard risk profile with no compliance flags. Recommended for expedited processing."

    DetailedPolicyInfo:
      type: object
      required:
        - policyNumber
        - carrierName
        - accountType
        - planType
        - ownership
        - productName
        - cusip
        - hasTrailingCommission
        - contractStatus
        - withdrawalStructure
        - errors
      properties:
        policyNumber:
          type: ["string","null"]
          description: Policy number identifying the policy
        carrierName:
          type: ["string","null"]
          description: Name of the insurance carrier that wrote the annuity
        accountType:
          type: ["string","null"]
          enum: [individual, joint, trust, custodial, entity]
          description: Registration type of the account
        planType:
          type: ["string","null"]
          enum: [nonQualified, rothIra, traditionalIra, sep, simple]
          description: Tax qualification type of the account
        ownership:
          type: ["string","null"]
          description: Ownership structure of the policy
        productName:
          type: ["string","null"]
          description: Name of the annuity product
        cusip:
          type: ["string","null"]
          description: CUSIP identifier for the product
        hasTrailingCommission:
          type: boolean
          description: Whether trailing commission will apply to the new servicing agent
        contractStatus:
          type: ["string","null"]
          description: Current status of the contract
        withdrawalStructure:
          type: object
          required:
            - isSystematicWithdrawalActive
          properties:
            isSystematicWithdrawalActive:
              type: boolean
              description: Whether a systematic withdrawal plan is currently active
        errors:
          type: array
          items:
            $ref: '#/components/schemas/PolicyError'
          description: Any errors or issues associated with this policy

    ServicingAgentChangeRequest:
      type: object
      required:
        - requestId
        - requestingFirm
        - carrier
        - client
      properties:
        requestId:
          type: string
          format: ulid
          description: Universally Unique Lexicographically Sortable Identifier generated by the requesting firm
        requestingFirm:
          type: object
          required:
            - firmName
            - firmId
            - servicingAgent
          properties:
            firmName:
              type: ["string","null"]
              description: Name of the receiving broker/dealer
            firmId:
              type: ["string","null"]
              description: DTCC firm identifier
            servicingAgent:
              type: object
              required:
                - agentName
                - npn
              properties:
                agentName:
                  type: ["string","null"]
                  description: Name of the new servicing agent
                npn:
                  type: ["string","null"]
                  description: National Producer Number of the new agent
                carrierSpecificId:
                  type: ["string","null"]
                  description: Carrier-specific identifier for the producer, if applicable
        carrier:
          type: object
          required:
            - carrierName
            - carrierId
          properties:
            carrierName:
              type: ["string","null"]
              description: Name of the insurance carrier
            carrierId:
              type: ["string","null"]
              description: Carrier identifier
        client:
          type: object
          required:
            - clientName
            - policyNumbers
          properties:
            clientName:
              type: ["string","null"]
              description: Full name of the client
            brokerageAccountNumber:
              type: ["string","null"]
              description: Optional. Brokerage account number that will hold the policy upon change
            policyNumbers:
              type: array
              items:
                type: string
              description: List of policy numbers issued by this carrier for this client
        context:
          type: string
          description: AI-generated context and insights to be shared between entities for enhanced processing intelligence
          examples:
            - "Based on policy inquiry findings, client preferences indicate preference for expedited processing."

    ServicingAgentChangeResponse:
      type: object
      required:
        - requestId
        - carrier
        - policies
      properties:
        requestId:
          type: string
          format: ulid
          description: Echoed request identifier for correlation and status polling
        carrier:
          type: object
          required:
            - carrierName
            - carrierId
          properties:
            carrierName:
              type: ["string","null"]
              description: Carrier name
            carrierId:
              type: ["string","null"]
              description: Carrier identifier
        policies:
          type: array
          items:
            $ref: '#/components/schemas/PolicyStatus'
          description: List of policy-level results
        context:
          type: string
          description: AI-generated context and insights to be shared between entities for enhanced processing intelligence
          examples:
            - "Carrier validation completed successfully. All requested agent appointments processed within standard timeframe."

    PolicyStatus:
      type: object
      required:
        - policyNumber
        - status
        - errors
      properties:
        policyNumber:
          type: ["string","null"]
          description: Policy number
        status:
          type: ["string","null"]
          enum: [approved, rejected, pendingAppointment]
          description: Current status of the servicing agent change for this policy
        effectiveDate:
          type: ["string","null"]
          format: date
          description: Effective date of the agent change, if approved. Null if rejected or pending.
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ServicingAgentChangeError'
          description: Any errors associated with this policy

    TransferNotification:
      type: object
      required:
        - notificationType
        - policyNumber
      properties:
        notificationType:
          type: string
          enum: [transfer-approved, transfer-initiated, transfer-confirmed, transfer-complete, service-agent-change-complete]
          description: Type of transfer notification
        policyNumber:
          type: string
          description: Policy identifier
        receivingBrokerId:
          type: string
          description: Identifier of the receiving broker-dealer
        deliveringBrokerId:
          type: string
          description: Identifier of the delivering broker-dealer
        carrierId:
          type: string
          description: Identifier of the insurance carrier
        effectiveDate:
          type: string
          format: date
          description: Effective date of the transfer
        notificationTimestamp:
          type: string
          format: date-time
          description: When the notification was sent
        additionalData:
          type: object
          description: Additional notification data (open-ended)

    TransferConfirmation:
      type: object
      required:
        - policyNumber
        - confirmationStatus
      properties:
        policyNumber:
          type: string
          description: Policy identifier
        confirmationStatus:
          type: string
          enum: [confirmed, failed, pending]
          description: Transfer confirmation status
        deliveringBrokerId:
          type: string
          description: Identifier of the delivering broker-dealer
        transferTimestamp:
          type: string
          format: date-time
          description: When the transfer was processed
        confirmationDetails:
          type: object
          description: Additional confirmation information
        additionalData:
          type: object
          description: Additional confirmation data (open-ended)

    RequestStatus:
      type: object
      required:
        - currentStatus
        - createdAt
        - updatedAt
      properties:
        currentStatus:
          type: string
          enum: 
            - POLICY_INQUIRY_REQUESTED
            - POLICY_INQUIRY_RECEIVED
            - DUE_DILIGENCE_COMPLETE
            - SERVICING_AGENT_CHANGE_REQUESTED
            - SERVICING_AGENT_CHANGE_APPROVED
            - SERVICING_AGENT_CHANGE_REJECTED
            - SERVICING_AGENT_CHANGE_PENDING
            - CARRIER_VALIDATION_PENDING
            - CARRIER_APPROVED
            - CARRIER_REJECTED
            - TRANSFER_INITIATED
            - TRANSFER_PROCESSING
            - TRANSFER_CONFIRMED
            - COMPLETE
          description: Current request status
        createdAt:
          type: string
          format: date-time
          description: Request creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
        entityRole:
          type: string
          enum: [clearinghouse, receiving_broker, delivering_broker, insurance_carrier]
          description: Role of this entity in the request
        entityId:
          type: string
          description: Identifier of the entity providing this status
        policiesAffected:
          type: array
          items:
            type: string
          description: List of policy numbers affected in this request
        carrierValidationDetails:
          type: object
          description: Details about carrier validation process (when applicable)
        routingInformation:
          type: object
          description: Information about request routing and entity communication
          properties:
            routingHistory:
              type: array
              items:
                type: object
                properties:
                  fromEntity:
                    type: string
                    description: Source entity identifier
                  toEntity:
                    type: string
                    description: Target entity identifier
                  routedAt:
                    type: string
                    format: date-time
                    description: When the request was routed
                  requestType:
                    type: string
                    description: Type of request routed
        additionalData:
          type: object
          description: Additional status data (open-ended)

    DeferredResponse:
      type: object
      required:
        - code
        - message
        - requestId
      properties:
        code:
          type: string
          description: |
            Response code indicating deferred processing.
            Examples: "DEFERRED", "QUEUED", "PROCESSING"
          examples:
            - "DEFERRED"
        message:
          type: string
          description: Human-readable response message describing the deferral
        requestId:
          type: string
          format: ulid
          description: |
            Unique request identifier (ULID) for tracking the request.
            Must be reflected in all subsequent related requests and responses.
        estimatedResponseTime:
          type: string
          description: |
            Estimated completion time for deferred responses (ISO 8601 duration format).
            Examples: "PT5M" (5 minutes), "PT1H" (1 hour), "P1D" (1 day)
        routingInformation:
          type: object
          description: |
            Information about request routing when requests are forwarded to other entities.
          properties:
            targetEntityType:
              type: string
              enum: [clearinghouse, broker_dealer, insurance_carrier]
              description: Type of target entity for routing
            targetEntityId:
              type: string
              description: Identifier of the target entity
            routedAt:
              type: string
              format: date-time
              description: When the request was routed
            routingReason:
              type: string
              description: Reason for routing (e.g., policy_mapping, business_rule, performance)

    AcknowledgmentResponse:
      type: object
      required:
        - code
        - message
        - requestId
      properties:
        code:
          type: string
          description: Response code indicating acknowledgment status
          examples:
            - "RECEIVED"
        message:
          type: string
          description: Human-readable response message describing the acknowledgment
        requestId:
          type: string
          format: ulid
          description: Request identifier from the original request

    CapabilityResponse:
      type: object
      required:
        - code
        - message
        - requestId
      properties:
        code:
          type: string
          enum: [NOT_CAPABLE]
          description: Response code indicating lack of capability
        message:
          type: string
          description: Human-readable message explaining the capability limitation
        requestId:
          type: string
          format: ulid
          description: Request identifier from the request
        capabilityLevel:
          type: string
          enum: [none, partial, conditional]
          description: |
            Level of capability available:
            - none: Cannot process any aspect of the request
            - partial: Can process some aspects but not complete request
            - conditional: Can process under certain conditions
        supportedAlternatives:
          type: array
          items:
            type: string
          description: Alternative approaches or entities that may be able to process the request
        retryAfter:
          type: string
          description: |
            When capability might be available (for temporarily_unavailable status).
            ISO 8601 duration or timestamp format.
        additionalDetails:
          type: object
          description: Additional information about the capability limitation
      examples:
        - code: "NOT_CAPABLE"
          message: "This entity does not support direct servicing agent change processing"
          requestId: "01JNQV8G3KXBCDEFGHJKMNPQRS"
          capabilityLevel: "none"
          supportedAlternatives: ["clearinghouse_routing", "direct_carrier_access"]

    ProducerError:
      type: object
      required:
        - errorCode
        - message
      properties:
        errorCode:
          type: string
          enum: [notAppointed, notLicensed, affiliationMismatch]
          description: Specific producer error code identifying the type of error
        message:
          type: string
          description: Human-readable error message
        carrierName:
          type: string
          description: Name of carrier related to the error (when applicable)
        jurisdiction:
          type: string
          description: State or jurisdiction related to licensing error (when applicable)
      examples:
        - errorCode: "notAppointed"
          message: "Producer is not appointed with Pacific Life"
          carrierName: "Pacific Life"

    PolicyError:
      type: object
      required:
        - errorCode
        - message
      properties:
        errorCode:
          type: string
          enum: [ssnContractMismatch, proprietaryProduct, policyInactive, policyRestricted]
          description: Specific error code identifying the type of error
        message:
          type: string
          description: Human-readable error message
        policyNumber:
          type: string
          description: Policy number related to the error (when applicable)
        restrictionDetails:
          type: object
          description: Additional details about policy restrictions (when applicable)
      examples:
        - errorCode: "ssnContractMismatch"
          message: "Client's SSN does not match the contract on file"
          policyNumber: "ABC123456"

    ServicingAgentChangeError:
      type: object
      required:
        - errorCode
        - severity
        - message
      properties:
        errorCode:
          type: string
          enum: 
            - competingChangeRequest
            - pendingDeathClaim
            - proprietaryProduct
            - notAppointedJit
            - notAppointedResubmit
            - notLicensed
            - carrierSpecific
            - pendingWithdrawalSurrender
            - policyNotInForce
            - noSellingServicingAgreement
          description: Specific error code identifying the type of error
        severity:
          type: string
          enum: [hard, soft]
          description: |
            Error severity:
            - hard: Request cannot proceed (blocking error)
            - soft: Request is in progress, pending resolution
        message:
          type: string
          description: Human-readable error message
      examples:
        - errorCode: "notAppointedJit"
          severity: "soft"
          message: "Producer is not appointed — appointment initiated by carrier"

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Error code
          examples:
            - "VALIDATION_ERROR"
        message:
          type: string
          description: Human-readable error message
        requestId:
          type: string
          format: ulid
          description: Request identifier (when available)
        errorDetails:
          type: object
          description: Additional error information
        timestamp:
          type: string
          format: date-time
          description: When the error occurred