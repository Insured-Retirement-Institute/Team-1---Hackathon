AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Distributor API - Agent/Client/Contract/Transaction management

Globals:
  Function:
    Timeout: 30
    MemorySize: 128
    Runtime: python3.12

Resources:
  DistributorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: distributor-api
      Handler: handler.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: distributor
      Events:
        Root:
          Type: Api
          Properties:
            Path: /
            Method: ANY
        Proxy:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod

  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt DistributorFunction.Arn
